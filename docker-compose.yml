services:
  db:
    image: postgres:16-alpine
    container_name: clinical-insight-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-clinical_insight_engine}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-clinical_insight_engine}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: clinical-insight-redis
    ports:
      - "6379:6379"
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinical-insight-app
    ports:
      - "5001:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/clinical_insight_engine}
      SESSION_SECRET: ${SESSION_SECRET:-clinical-insight-engine-dev-secret}
      PUPPETEER_SKIP_DOWNLOAD: "true"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      # Mount the workspace directory to support hot-reloading in development
      - .:/app
      # Preserve container-internal node_modules and python virtual environment
      - /app/node_modules
      - /app/.venv
    command: sh -c "npm install && npm run db:push && npm run dev"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

volumes:
  db-data:
    driver: local

networks:
  app-network:
    driver: bridge
